name: Build & Release Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v4
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v
          flutter config --enable-android

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK (Release - Split Per ABI)
        run: flutter build apk --release --split-per-abi -v

      - name: Build Android APK (Universal)
        run: flutter build apk --release -v

      - name: Verify APK files
        run: |
          ls -lah build/app/outputs/apk/release/
          find build/app/outputs/apk/release -name "*.apk" -type f

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk-release
          path: build/app/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE=$(find build/app/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -f "$APK_FILE" ]; then
            gh release create "${{ github.ref_name }}" \
              "$APK_FILE" \
              --title "APK Release ${{ github.ref_name }}" \
              --draft=false \
              --prerelease=false \
              --repo ${{ github.repository }}
          else
            echo "APK file not found!"
            exit 1
          fi

      - name: Upload to Artifact Hub (optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/apk/release/
