name: Build & Release Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31
          target: android-31

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:G1NewCollectionPercentage=30 -XX:G1ReservePercent=20
          org.gradle.parallel=true
          org.gradle.daemon=true
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableD8=true
          android.enableR8=true
          android.enableDesugaring=true
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter environment
        run: |
          flutter --version
          flutter doctor -v
          flutter config --enable-android

      - name: Get dependencies
        run: flutter pub get

      - name: Download Android dependencies
        run: flutter precache --android

      - name: Build APK (debug first)
        continue-on-error: true
        run: |
          echo "🔨 Building debug APK..."
          flutter build apk --debug -v 2>&1 | tee -a build.log
          
      - name: Build APK (release)
        run: |
          echo "🔨 Building release APK..."
          flutter build apk --release -v 2>&1 | tee -a build.log

      - name: Check build output
        run: |
          echo "📂 Checking build directory..."
          find build -type d -name "apk" | head -20
          find build -name "*.apk" | head -20

      - name: List APK files
        if: always()
        run: |
          echo "🔍 Searching for APK files..."
          find build -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "📂 Full build structure:"
          ls -lah build/app/outputs/ 2>/dev/null || echo "build/app/outputs not found"
          ls -lah build/app/ 2>/dev/null || echo "build/app not found"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk-release
          path: build/app/outputs/apk/release/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE=$(find build -name "*.apk" -type f | grep release | head -1)
          if [ -f "$APK_FILE" ]; then
            gh release create "${{ github.ref_name }}" \
              "$APK_FILE" \
              --title "APK Release ${{ github.ref_name }}" \
              --draft=false \
              --prerelease=false \
              --repo ${{ github.repository }}
          else
            echo "⚠️ No release APK found"
            exit 1
          fi
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/apk/release/
