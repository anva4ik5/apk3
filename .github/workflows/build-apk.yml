name: Build & Release Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31
          target: android-31

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:G1NewCollectionPercentage=30 -XX:G1ReservePercent=20
          org.gradle.parallel=true
          org.gradle.daemon=true
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableD8=true
          android.enableR8=true
          android.enableDesugaring=true
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter environment
        run: |
          flutter --version
          flutter doctor -v
          flutter config --enable-android

      - name: Get dependencies
        run: flutter pub get

      - name: Download Android dependencies
        run: flutter precache --android

      - name: Verify Android setup
        run: |
          echo "📋 Android SDK info:"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null | head -20 || echo "No platforms found"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null | head -20 || echo "No build-tools found"
          
          echo ""
          echo "📋 Flutter config:"
          flutter doctor -v

      - name: Build APK (debug first)
        continue-on-error: true
        run: |
          echo "🔨 Building debug APK..."
          flutter build apk --debug -v 2>&1 | tee -a build.log
          echo "Exit code: $?"

      - name: Build APK (release)
        run: |
          echo "🔨 Building release APK..."
          flutter build apk --release -v 2>&1 | tee -a build.log
          echo "Exit code: $?"

      - name: Check build output
        if: always()
        run: |
          echo "📂 Checking build directory..."
          if [ -d "build" ]; then
            echo "✅ build directory exists"
            find build -type d -name "apk" 2>/dev/null | head -20 || echo "No apk directories found"
            find build -name "*.apk" 2>/dev/null | head -20 || echo "No APK files found"
          else
            echo "❌ build directory does not exist"
            echo "Current directory contents:"
            ls -lah
          fi

      - name: List APK files
        if: always()
        continue-on-error: true
        run: |
          echo "🔍 Searching for APK files..."
          if [ -d "build" ]; then
            find build -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || true
          else
            echo "⚠️ build directory not found"
            echo "Listing root directory:"
            ls -lah .
          fi
          echo ""
          echo "📂 Expected build structure:"
          echo "build/app/outputs/apk/release/ (for release APKs)"
          echo "build/app/outputs/apk/debug/ (for debug APKs)"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7

      - name: Find and upload APK artifacts
        if: always()
        continue-on-error: true
        run: |
          echo "🔎 Searching for APK files to upload..."
          APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null | grep -v ".gradle" || true)
          
          if [ -z "$APK_FILES" ]; then
            echo "⚠️ No APK files found!"
            echo "Build directory structure:"
            find . -maxdepth 3 -type d | head -30
            exit 1
          else
            echo "✅ Found APK files:"
            echo "$APK_FILES"
            mkdir -p apk_artifacts
            find . -name "*.apk" -type f -exec cp {} apk_artifacts/ \;
            ls -lah apk_artifacts/
          fi

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: apk_artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Creating GitHub Release..."
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | grep release | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "⚠️ No release APK found for GitHub Release"
            exit 0
          fi
          
          if [ -f "$APK_FILE" ]; then
            echo "✅ Uploading $APK_FILE to GitHub Release"
            gh release create "${{ github.ref_name }}" \
              "$APK_FILE" \
              --title "APK Release ${{ github.ref_name }}" \
              --draft=false \
              --prerelease=false \
              --repo ${{ github.repository }}
          else
            echo "❌ APK file does not exist"
          fi
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/apk/release/
