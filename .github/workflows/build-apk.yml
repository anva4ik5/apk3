name: Build & Release Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 31
          target: android-31

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          printf 'org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:+ParallelRefProcEnabled\norg.gradle.parallel=true\norg.gradle.daemon=true\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n' > ~/.gradle/gradle.properties

      - name: Fix Gradle Wrapper
        run: |
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip\n' > android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter environment
        run: |
          flutter --version
          flutter doctor -v
          flutter config --enable-android

      - name: Get dependencies
        run: flutter pub get

      - name: Download Android dependencies
        run: flutter precache --android

      - name: Verify Android setup
        run: |
          echo "📋 Android SDK info:"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null | head -20 || echo "No platforms found"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null | head -20 || echo "No build-tools found"
          echo ""
          echo "📋 Flutter config:"
          flutter doctor -v

      - name: Clean Flutter build cache
        run: |
          echo "🧹 Cleaning Flutter build artifacts..."
          flutter clean
          rm -rf build/
          flutter pub get
          echo "✅ Clean complete"

      - name: Build APK (debug first)
        continue-on-error: true
        run: |
          echo "🔨 Building debug APK..."
          flutter build apk --debug -v 2>&1 | tee build_debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Debug build exit code: $EXIT_CODE"

      - name: Build APK (release)
        run: |
          echo "🔨 Building release APK..."
          set -e
          flutter build apk --release -v 2>&1 | tee build_release.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Release APK build successful"
          else
            echo "❌ Release APK build failed!"
            cat build_release.log
            exit 1
          fi

      - name: Check build output
        if: always()
        run: |
          echo "📂 Checking build directory..."
          if [ -d "build" ]; then
            find build -type f -name "*.apk" 2>/dev/null || echo "No APK files in build/"
          else
            echo "❌ build directory NOT created"
          fi

      - name: Display build logs
        if: always()
        run: |
          [ -f build_debug.log ] && tail -100 build_debug.log || true
          [ -f build_release.log ] && tail -100 build_release.log || true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_debug.log
            build_release.log
          retention-days: 7

      - name: Find and upload APK artifacts
        if: always()
        continue-on-error: true
        run: |
          APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null | grep -v ".gradle" || true)
          if [ -z "$APK_FILES" ]; then
            echo "⚠️ No APK files found!"
            exit 1
          else
            mkdir -p apk_artifacts
            find . -name "*.apk" -type f -exec cp {} apk_artifacts/ \;
            ls -lah apk_artifacts/
          fi

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: apk_artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | grep release | head -1)
          if [ -n "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
            gh release create "${{ github.ref_name }}" \
              "$APK_FILE" \
              --title "APK Release ${{ github.ref_name }}" \
              --draft=false \
              --prerelease=false \
              --repo ${{ github.repository }}
          else
            echo "⚠️ No release APK found"
          fi
